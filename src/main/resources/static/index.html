<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskForge — Team Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --surface3: #22222e;
  --border: #2a2a3a;
  --accent: #f0c040;
  --accent2: #4a9eff;
  --accent3: #ff5a5a;
  --accent4: #50e3a4;
  --text: #e8e8f0;
  --text2: #8888a8;
  --text3: #55556a;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --radius: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* LAYOUT */
#app { display:flex; height:100vh; }
#sidebar { width:240px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; transition: transform 0.3s; }
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#topbar { height:56px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; gap:12px; flex-shrink:0; background:var(--surface); }
#content { flex:1; overflow-y:auto; padding:28px; }

/* SIDEBAR */
.sidebar-logo { padding:20px 20px 16px; border-bottom:1px solid var(--border); }
.logo-text { font-family:var(--mono); font-size:18px; font-weight:700; color:var(--accent); letter-spacing:-0.5px; }
.logo-sub { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:2px; margin-top:2px; font-family:var(--mono); }
.sidebar-nav { flex:1; padding:16px 0; }
.nav-section { margin-bottom:8px; }
.nav-label { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:var(--text3); padding:8px 20px 4px; font-family:var(--mono); }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 20px; cursor:pointer; transition:all 0.15s; color:var(--text2); font-size:14px; font-weight:500; border-left:3px solid transparent; }
.nav-item:hover { color:var(--text); background:var(--surface2); }
.nav-item.active { color:var(--accent); background:rgba(240,192,64,0.06); border-left-color:var(--accent); }
.nav-item .icon { width:18px; text-align:center; font-size:16px; }
.sidebar-footer { padding:16px 20px; border-top:1px solid var(--border); }
.user-chip { display:flex; align-items:center; gap:10px; }
.avatar { width:32px; height:32px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:12px; font-weight:700; color:var(--bg); flex-shrink:0; }
.user-info { flex:1; min-width:0; }
.user-name { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-role { font-size:10px; color:var(--accent); font-family:var(--mono); }
.btn-logout { background:none; border:none; cursor:pointer; color:var(--text3); font-size:14px; padding:4px; transition:color 0.15s; }
.btn-logout:hover { color:var(--accent3); }

/* TOPBAR */
.topbar-title { font-family:var(--mono); font-size:14px; color:var(--text); font-weight:700; flex:1; }
.topbar-actions { display:flex; gap:8px; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--radius); font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s; border:1px solid transparent; text-decoration:none; }
.btn-primary { background:var(--accent); color:var(--bg); border-color:var(--accent); }
.btn-primary:hover { background:#e0b030; }
.btn-secondary { background:var(--surface2); color:var(--text); border-color:var(--border); }
.btn-secondary:hover { border-color:var(--accent2); color:var(--accent2); }
.btn-danger { background:rgba(255,90,90,0.1); color:var(--accent3); border-color:rgba(255,90,90,0.3); }
.btn-danger:hover { background:rgba(255,90,90,0.2); }
.btn-ghost { background:none; color:var(--text2); border-color:transparent; }
.btn-ghost:hover { color:var(--text); background:var(--surface2); }
.btn-sm { padding:5px 10px; font-size:12px; }

/* CARDS */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); }
.card-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.card-body { padding:20px; }
.card-title { font-family:var(--mono); font-size:13px; font-weight:700; color:var(--text); }

/* STATS GRID */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:16px; margin-bottom:24px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; position:relative; overflow:hidden; }
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.stat-card.yellow::before { background:var(--accent); }
.stat-card.blue::before { background:var(--accent2); }
.stat-card.green::before { background:var(--accent4); }
.stat-card.red::before { background:var(--accent3); }
.stat-number { font-family:var(--mono); font-size:32px; font-weight:700; line-height:1; }
.stat-label { font-size:11px; color:var(--text2); margin-top:6px; text-transform:uppercase; letter-spacing:1px; }

/* TABLES */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; padding:10px 14px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--text3); border-bottom:1px solid var(--border); font-family:var(--mono); }
td { padding:12px 14px; font-size:13px; border-bottom:1px solid rgba(42,42,58,0.5); vertical-align:middle; }
tr:hover td { background:rgba(255,255,255,0.02); }
tr:last-child td { border-bottom:none; }

/* BADGES */
.badge { display:inline-flex; align-items:center; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:600; font-family:var(--mono); letter-spacing:0.5px; }
.badge-todo { background:rgba(136,136,168,0.15); color:var(--text2); }
.badge-in_progress { background:rgba(74,158,255,0.15); color:var(--accent2); }
.badge-review { background:rgba(240,192,64,0.15); color:var(--accent); }
.badge-done { background:rgba(80,227,164,0.15); color:var(--accent4); }
.badge-low { background:rgba(80,227,164,0.1); color:var(--accent4); }
.badge-medium { background:rgba(240,192,64,0.1); color:var(--accent); }
.badge-high { background:rgba(255,150,50,0.15); color:#ff9632; }
.badge-critical { background:rgba(255,90,90,0.15); color:var(--accent3); }
.badge-active { background:rgba(80,227,164,0.15); color:var(--accent4); }
.badge-completed { background:rgba(136,136,168,0.15); color:var(--text2); }
.badge-admin { background:rgba(240,192,64,0.15); color:var(--accent); }
.badge-member { background:rgba(74,158,255,0.1); color:var(--accent2); }
.overdue-tag { color:var(--accent3); font-size:10px; font-family:var(--mono); }

/* FORMS */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:8px; width:480px; max-height:85vh; overflow-y:auto; box-shadow:var(--shadow); animation:slideUp 0.2s ease; }
@keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.modal-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-family:var(--mono); font-size:14px; font-weight:700; color:var(--text); }
.modal-close { background:none; border:none; cursor:pointer; color:var(--text3); font-size:20px; transition:color 0.15s; line-height:1; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:24px; }
.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.form-group { margin-bottom:18px; }
.form-label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text3); margin-bottom:6px; font-family:var(--mono); }
.form-control { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; font-size:13px; color:var(--text); font-family:var(--sans); transition:border-color 0.15s; }
.form-control:focus { outline:none; border-color:var(--accent); }
.form-control::placeholder { color:var(--text3); }
select.form-control { cursor:pointer; }
textarea.form-control { resize:vertical; min-height:80px; }

/* AUTH */
#auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
.auth-box { width:400px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:40px; box-shadow:var(--shadow); }
.auth-logo { text-align:center; margin-bottom:32px; }
.auth-logo-text { font-family:var(--mono); font-size:24px; font-weight:700; color:var(--accent); }
.auth-logo-sub { font-size:12px; color:var(--text3); margin-top:4px; font-family:var(--mono); }
.auth-tabs { display:flex; border:1px solid var(--border); border-radius:var(--radius); margin-bottom:28px; overflow:hidden; }
.auth-tab { flex:1; padding:10px; text-align:center; cursor:pointer; font-size:13px; font-weight:600; color:var(--text2); transition:all 0.15s; border:none; background:none; font-family:var(--sans); }
.auth-tab.active { background:var(--accent); color:var(--bg); }

/* ALERTS */
.alert { padding:10px 14px; border-radius:var(--radius); font-size:13px; margin-bottom:16px; display:none; }
.alert.show { display:block; }
.alert-error { background:rgba(255,90,90,0.1); color:var(--accent3); border:1px solid rgba(255,90,90,0.2); }
.alert-success { background:rgba(80,227,164,0.1); color:var(--accent4); border:1px solid rgba(80,227,164,0.2); }

/* MISC */
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.page-title { font-family:var(--mono); font-size:20px; font-weight:700; }
.section-title { font-family:var(--mono); font-size:13px; color:var(--text2); margin-bottom:16px; text-transform:uppercase; letter-spacing:1px; }
.empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
.empty-icon { font-size:48px; margin-bottom:12px; }
.empty-text { font-family:var(--mono); font-size:13px; }
.progress-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:8px; }
.progress-fill { height:100%; background:var(--accent4); border-radius:2px; transition:width 0.5s; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.mt-4 { margin-top:16px; }
.mb-4 { margin-bottom:16px; }
.text-muted { color:var(--text3); font-size:12px; }
.flex { display:flex; }
.gap-2 { gap:8px; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.task-row:hover { cursor:pointer; }
.kbd { font-family:var(--mono); font-size:11px; background:var(--surface3); border:1px solid var(--border); padding:2px 6px; border-radius:3px; }
.loading { display:inline-block; width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-text">⬡ TaskForge</div>
      <div class="auth-logo-sub">// Team Task Manager</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div id="auth-alert" class="alert alert-error"></div>

    <!-- LOGIN -->
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input id="login-user" class="form-control" type="text" placeholder="Enter username or email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="login-pass" class="form-control" type="password" placeholder="Enter password">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Login →</button>
    </div>

    <!-- SIGNUP -->
    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input id="su-name" class="form-control" type="text" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input id="su-user" class="form-control" type="text" placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="su-email" class="form-control" type="email" placeholder="Your email address">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="su-pass" class="form-control" type="password" placeholder="Min 6 characters">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doSignup()">Create Account →</button>
    </div>
    <p class="text-muted" style="margin-top:16px;text-align:center">First user registered becomes Admin</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">⬡ TaskForge</div>
      <div class="logo-sub">// Task Manager</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Main</div>
        <div class="nav-item active" onclick="navigate('dashboard')"><span class="icon">◈</span> Dashboard</div>
        <div class="nav-item" onclick="navigate('projects')"><span class="icon">⬡</span> Projects</div>
        <div class="nav-item" onclick="navigate('tasks')"><span class="icon">◻</span> My Tasks</div>
      </div>
      <div id="admin-nav" class="nav-section" style="display:none">
        <div class="nav-label">Admin</div>
        <div class="nav-item" onclick="navigate('users')"><span class="icon">◎</span> Users</div>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-display-name">Loading...</div>
          <div class="user-role" id="user-display-role">member</div>
        </div>
        <button class="btn-logout" onclick="logout()" title="Logout">⏏</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div id="content">
      <!-- Pages rendered here -->
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-project">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="proj-modal-title">New Project</div>
      <button class="modal-close" onclick="closeModal('modal-project')">×</button>
    </div>
    <div class="modal-body">
      <div id="proj-modal-alert" class="alert alert-error"></div>
      <input type="hidden" id="proj-edit-id">
      <div class="form-group">
        <label class="form-label">Project Name *</label>
        <input id="proj-name" class="form-control" type="text" placeholder="Enter project name">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="proj-desc" class="form-control" placeholder="What is this project about?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Deadline</label>
        <input id="proj-deadline" class="form-control" type="datetime-local">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-project')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-task">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="task-modal-title">New Task</div>
      <button class="modal-close" onclick="closeModal('modal-task')">×</button>
    </div>
    <div class="modal-body">
      <div id="task-modal-alert" class="alert alert-error"></div>
      <input type="hidden" id="task-edit-id">
      <input type="hidden" id="task-project-id">
      <div class="form-group">
        <label class="form-label">Task Title *</label>
        <input id="task-title" class="form-control" type="text" placeholder="What needs to be done?">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="task-desc" class="form-control" placeholder="Details about this task..."></textarea>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select id="task-priority" class="form-control">
            <option value="LOW">Low</option>
            <option value="MEDIUM" selected>Medium</option>
            <option value="HIGH">High</option>
            <option value="CRITICAL">Critical</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="task-status" class="form-control">
            <option value="TODO">Todo</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="REVIEW">Review</option>
            <option value="DONE">Done</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Assign To</label>
        <select id="task-assignee" class="form-control">
          <option value="">— Unassigned —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input id="task-due" class="form-control" type="datetime-local">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-task')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<script>
// ========== STATE ==========
const API = '/api';
let token = localStorage.getItem('tf_token');
let currentUser = null;
let allUsers = [];
let currentPage = 'dashboard';
let currentProjectId = null;

// ========== AUTH ==========
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0)===(tab==='login')));
  document.getElementById('login-form').style.display = tab==='login'?'':'none';
  document.getElementById('signup-form').style.display = tab==='signup'?'':'none';
  document.getElementById('auth-alert').classList.remove('show');
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (!u || !p) return showAuthAlert('Please fill all fields');
  try {
    const res = await fetch(`${API}/auth/login`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({usernameOrEmail:u, password:p})});
    const data = await res.json();
    if (!res.ok) return showAuthAlert(data.message || 'Login failed');
    token = data.token;
    localStorage.setItem('tf_token', token);
    currentUser = data;
    initApp();
  } catch(e) { showAuthAlert('Server error. Try again.'); }
}

async function doSignup() {
  const name = document.getElementById('su-name').value.trim();
  const user = document.getElementById('su-user').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const pass = document.getElementById('su-pass').value;
  if (!user || !email || !pass) return showAuthAlert('Please fill required fields');
  try {
    const res = await fetch(`${API}/auth/signup`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:user, email, password:pass, fullName:name})});
    const data = await res.json();
    if (!res.ok) return showAuthAlert(data.message || 'Signup failed');
    token = data.token;
    localStorage.setItem('tf_token', token);
    currentUser = data;
    initApp();
  } catch(e) { showAuthAlert('Server error. Try again.'); }
}

function showAuthAlert(msg) {
  const el = document.getElementById('auth-alert');
  el.textContent = msg;
  el.classList.add('show');
}

function logout() {
  localStorage.removeItem('tf_token');
  token = null; currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// ========== APP INIT ==========
async function initApp() {
  if (!token) return;
  try {
    const res = await apiFetch('/auth/me');
    if (!res.ok) { logout(); return; }
    currentUser = await res.json();
  } catch(e) { logout(); return; }

  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-display-name').textContent = currentUser.fullName || currentUser.username;
  document.getElementById('user-display-role').textContent = currentUser.role || 'MEMBER';
  document.getElementById('user-avatar').textContent = (currentUser.fullName || currentUser.username || '?')[0].toUpperCase();

  if (currentUser.role === 'ADMIN') {
    document.getElementById('admin-nav').style.display = '';
  }

  // Load users for selects
  try {
    const ur = await apiFetch('/users');
    allUsers = await ur.json();
  } catch(e) {}

  navigate('dashboard');
}

// ========== API HELPER ==========
function apiFetch(path, opts={}) {
  return fetch(`${API}${path}`, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers||{}) }
  });
}

// ========== NAVIGATION ==========
function navigate(page, projectId) {
  currentPage = page;
  if (projectId) currentProjectId = projectId;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navMap = { dashboard: 0, projects: 1, tasks: 2, users: 3 };
  document.querySelectorAll('.nav-item')[navMap[page] ?? 0]?.classList.add('active');

  const titles = { dashboard: 'Dashboard', projects: 'Projects', tasks: 'My Tasks', project_detail: 'Project', users: 'User Management' };
  document.getElementById('topbar-title').textContent = titles[page] || page;

  const pages = { dashboard: renderDashboard, projects: renderProjects, tasks: renderMyTasks, project_detail: renderProjectDetail, users: renderUsers };
  (pages[page] || renderDashboard)();
}

// ========== DASHBOARD ==========
async function renderDashboard() {
  document.getElementById('topbar-actions').innerHTML = '';
  const c = document.getElementById('content');
  c.innerHTML = '<div class="loading" style="margin:40px auto;display:block"></div>';
  try {
    const res = await apiFetch('/dashboard');
    const d = await res.json();
    c.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card yellow"><div class="stat-number">${d.totalProjects}</div><div class="stat-label">Total Projects</div></div>
        <div class="stat-card blue"><div class="stat-number">${d.totalTasks}</div><div class="stat-label">Total Tasks</div></div>
        <div class="stat-card green"><div class="stat-number">${d.doneTasks}</div><div class="stat-label">Completed</div></div>
        <div class="stat-card red"><div class="stat-number">${d.overdueTasks}</div><div class="stat-label">Overdue</div></div>
      </div>
      <div class="grid-2" style="gap:20px">
        <div class="card">
          <div class="card-header"><div class="card-title">Recent Projects</div></div>
          <div class="card-body" style="padding:0">
            ${d.recentProjects.length ? d.recentProjects.map(p => `
              <div style="padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer" onclick="navigate('project_detail',${p.id})">
                <div class="flex items-center justify-between">
                  <span style="font-weight:600;font-size:14px">${p.name}</span>
                  <span class="badge badge-${p.status.toLowerCase()}">${p.status}</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${p.totalTasks ? Math.round(p.completedTasks/p.totalTasks*100) : 0}%"></div></div>
                <div class="text-muted" style="margin-top:4px">${p.completedTasks}/${p.totalTasks} tasks</div>
              </div>`).join('') : '<div class="empty-state"><div class="empty-text">No projects yet</div></div>'}
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">My Tasks</div></div>
          <div class="card-body" style="padding:0">
            ${d.myTasks.length ? d.myTasks.slice(0,8).map(t => `
              <div style="padding:12px 20px;border-bottom:1px solid var(--border)">
                <div class="flex items-center justify-between">
                  <span style="font-size:13px">${t.title}</span>
                  <span class="badge badge-${t.status.toLowerCase()}">${t.status.replace('_',' ')}</span>
                </div>
                <div class="text-muted">${t.projectName} ${t.overdue ? '· <span class="overdue-tag">⚠ OVERDUE</span>' : ''}</div>
              </div>`).join('') : '<div class="empty-state"><div class="empty-text">No tasks assigned</div></div>'}
          </div>
        </div>
      </div>`;
  } catch(e) { c.innerHTML = '<div class="empty-state"><div class="empty-text">Failed to load dashboard</div></div>'; }
}

// ========== PROJECTS ==========
async function renderProjects() {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary btn-sm" onclick="openProjectModal()">+ New Project</button>`;
  const c = document.getElementById('content');
  c.innerHTML = '<div style="color:var(--text3);font-family:var(--mono);font-size:12px">Loading...</div>';
  try {
    const res = await apiFetch('/projects');
    const projects = await res.json();
    c.innerHTML = projects.length ? `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
        ${projects.map(p => `
          <div class="card" style="cursor:pointer" onclick="navigate('project_detail',${p.id})">
            <div class="card-header">
              <div>
                <div class="card-title">${p.name}</div>
                <div class="text-muted" style="margin-top:2px">${p.owner.username}</div>
              </div>
              <span class="badge badge-${p.status.toLowerCase()}">${p.status}</span>
            </div>
            <div class="card-body">
              <div class="text-muted" style="margin-bottom:12px;font-size:13px">${p.description || 'No description'}</div>
              <div class="flex items-center justify-between">
                <span class="text-muted">${p.totalTasks} tasks · ${p.members.length} members</span>
                <span style="font-family:var(--mono);font-size:12px;color:var(--accent4)">${p.totalTasks ? Math.round(p.completedTasks/p.totalTasks*100) : 0}%</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${p.totalTasks ? Math.round(p.completedTasks/p.totalTasks*100) : 0}%"></div></div>
              ${p.deadline ? `<div class="text-muted" style="margin-top:8px">Due: ${formatDate(p.deadline)}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>` : `<div class="empty-state"><div class="empty-icon">⬡</div><div class="empty-text">No projects yet. Create one!</div></div>`;
  } catch(e) { c.innerHTML = '<div class="empty-state"><div class="empty-text">Failed to load projects</div></div>'; }
}

// ========== PROJECT DETAIL ==========
async function renderProjectDetail() {
  const pid = currentProjectId;
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-secondary btn-sm" onclick="navigate('projects')">← Projects</button>
    <button class="btn btn-primary btn-sm" onclick="openTaskModal(${pid})">+ New Task</button>`;
  const c = document.getElementById('content');
  c.innerHTML = '<div style="color:var(--text3)">Loading...</div>';
  try {
    const [pr, tr] = await Promise.all([apiFetch(`/projects/${pid}`), apiFetch(`/projects/${pid}/tasks`)]);
    const proj = await pr.json();
    const tasks = await tr.json();
    document.getElementById('topbar-title').textContent = proj.name;

    const grouped = { TODO: [], IN_PROGRESS: [], REVIEW: [], DONE: [] };
    tasks.forEach(t => { if (grouped[t.status]) grouped[t.status].push(t); else grouped.TODO.push(t); });

    const statusLabels = { TODO: 'To Do', IN_PROGRESS: 'In Progress', REVIEW: 'Review', DONE: 'Done' };
    const statusColors = { TODO: 'var(--text2)', IN_PROGRESS: 'var(--accent2)', REVIEW: 'var(--accent)', DONE: 'var(--accent4)' };

    c.innerHTML = `
      <div class="card mb-4">
        <div class="card-body">
          <div class="flex items-center justify-between">
            <div>
              <div style="font-family:var(--mono);font-size:18px;font-weight:700">${proj.name}</div>
              <div class="text-muted" style="margin-top:4px">${proj.description || ''}</div>
            </div>
            <div style="text-align:right">
              <span class="badge badge-${proj.status.toLowerCase()}">${proj.status}</span>
              ${currentUser.role==='ADMIN' || proj.owner.id===currentUser.id ? `
                <div style="margin-top:8px;display:flex;gap:6px">
                  <button class="btn btn-secondary btn-sm" onclick="openProjectModal(${JSON.stringify(proj).replace(/"/g,'&quot;')})">Edit</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteProject(${proj.id})">Delete</button>
                </div>` : ''}
            </div>
          </div>
          <div style="margin-top:12px;display:flex;gap:20px">
            <span class="text-muted">Owner: <b style="color:var(--text)">${proj.owner.username}</b></span>
            <span class="text-muted">Members: <b style="color:var(--text)">${proj.members.length}</b></span>
            ${proj.deadline ? `<span class="text-muted">Deadline: <b style="color:var(--text)">${formatDate(proj.deadline)}</b></span>` : ''}
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
        ${Object.entries(grouped).map(([status, stasks]) => `
          <div>
            <div style="font-family:var(--mono);font-size:11px;color:${statusColors[status]};margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">
              ${statusLabels[status]} <span style="color:var(--text3)">(${stasks.length})</span>
            </div>
            ${stasks.map(t => `
              <div class="card" style="margin-bottom:10px;cursor:pointer" onclick="openTaskModal(${pid}, ${JSON.stringify(t).replace(/"/g,'&quot;')})">
                <div class="card-body" style="padding:14px">
                  <div style="font-size:13px;font-weight:500;margin-bottom:8px">${t.title}</div>
                  <div class="flex items-center justify-between">
                    <span class="badge badge-${t.priority.toLowerCase()}">${t.priority}</span>
                    ${t.overdue ? '<span class="overdue-tag">⚠ overdue</span>' : ''}
                  </div>
                  ${t.assignee ? `<div class="text-muted" style="margin-top:6px">@ ${t.assignee.username}</div>` : ''}
                  ${t.dueDate ? `<div class="text-muted" style="margin-top:2px">${formatDate(t.dueDate)}</div>` : ''}
                </div>
              </div>`).join('')}
          </div>`).join('')}
      </div>`;
  } catch(e) { c.innerHTML = '<div class="empty-state"><div class="empty-text">Failed to load project</div></div>'; }
}

// ========== MY TASKS ==========
async function renderMyTasks() {
  document.getElementById('topbar-actions').innerHTML = '';
  const c = document.getElementById('content');
  c.innerHTML = '<div style="color:var(--text3)">Loading...</div>';
  try {
    const res = await apiFetch('/tasks/my');
    const tasks = await res.json();
    c.innerHTML = tasks.length ? `
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Task</th><th>Project</th><th>Status</th><th>Priority</th><th>Due Date</th><th>Actions</th></tr></thead>
            <tbody>
              ${tasks.map(t => `
                <tr class="task-row">
                  <td><div style="font-weight:500">${t.title}</div>${t.description ? `<div class="text-muted">${t.description.slice(0,60)}...</div>` : ''}</td>
                  <td><span style="color:var(--accent2);cursor:pointer" onclick="navigate('project_detail',${t.projectId})">${t.projectName}</span></td>
                  <td><span class="badge badge-${t.status.toLowerCase()}">${t.status.replace('_',' ')}</span></td>
                  <td><span class="badge badge-${t.priority.toLowerCase()}">${t.priority}</span></td>
                  <td>${t.dueDate ? `<span ${t.overdue?'style="color:var(--accent3)"':''}>${formatDate(t.dueDate)}</span>` : '<span class="text-muted">—</span>'}</td>
                  <td>
                    <div class="flex gap-2">
                      <select class="form-control" style="width:130px;padding:4px 8px;font-size:12px" onchange="quickUpdateStatus(${t.id}, this.value)">
                        <option value="TODO" ${t.status==='TODO'?'selected':''}>Todo</option>
                        <option value="IN_PROGRESS" ${t.status==='IN_PROGRESS'?'selected':''}>In Progress</option>
                        <option value="REVIEW" ${t.status==='REVIEW'?'selected':''}>Review</option>
                        <option value="DONE" ${t.status==='DONE'?'selected':''}>Done</option>
                      </select>
                    </div>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>` : `<div class="empty-state"><div class="empty-icon">◻</div><div class="empty-text">No tasks assigned to you</div></div>`;
  } catch(e) { c.innerHTML = '<div class="empty-state"><div class="empty-text">Failed to load tasks</div></div>'; }
}

// ========== USERS (ADMIN) ==========
async function renderUsers() {
  if (currentUser.role !== 'ADMIN') { navigate('dashboard'); return; }
  document.getElementById('topbar-actions').innerHTML = '';
  const c = document.getElementById('content');
  c.innerHTML = '<div style="color:var(--text3)">Loading...</div>';
  try {
    const res = await apiFetch('/users');
    const users = await res.json();
    c.innerHTML = `
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
            <tbody>
              ${users.map(u => `
                <tr>
                  <td><div style="font-weight:600">${u.fullName || u.username}</div><div class="text-muted">@${u.username}</div></td>
                  <td>${u.email}</td>
                  <td><span class="badge badge-${u.role.toLowerCase()}">${u.role}</span></td>
                  <td>${u.role !== 'ADMIN' ? `<button class="btn btn-secondary btn-sm" onclick="promoteUser(${u.id})">Promote to Admin</button>` : '<span class="text-muted">—</span>'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch(e) { c.innerHTML = '<div class="empty-state"><div class="empty-text">Failed to load users</div></div>'; }
}

// ========== MODALS ==========
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openProjectModal(proj) {
  document.getElementById('proj-modal-title').textContent = proj ? 'Edit Project' : 'New Project';
  document.getElementById('proj-edit-id').value = proj ? proj.id : '';
  document.getElementById('proj-name').value = proj ? proj.name : '';
  document.getElementById('proj-desc').value = proj ? (proj.description||'') : '';
  document.getElementById('proj-deadline').value = proj && proj.deadline ? proj.deadline.slice(0,16) : '';
  document.getElementById('proj-modal-alert').classList.remove('show');
  openModal('modal-project');
}

async function saveProject() {
  const id = document.getElementById('proj-edit-id').value;
  const name = document.getElementById('proj-name').value.trim();
  if (!name) { showModalAlert('proj-modal-alert','Project name is required'); return; }
  const body = {
    name,
    description: document.getElementById('proj-desc').value.trim(),
    deadline: document.getElementById('proj-deadline').value || null
  };
  try {
    const res = id
      ? await apiFetch(`/projects/${id}`, {method:'PUT', body:JSON.stringify(body)})
      : await apiFetch('/projects', {method:'POST', body:JSON.stringify(body)});
    if (!res.ok) { const e = await res.text(); showModalAlert('proj-modal-alert', e); return; }
    closeModal('modal-project');
    navigate(id ? 'project_detail' : 'projects', id ? currentProjectId : null);
  } catch(e) { showModalAlert('proj-modal-alert','Server error'); }
}

async function deleteProject(id) {
  if (!confirm('Delete this project and all its tasks?')) return;
  await apiFetch(`/projects/${id}`, {method:'DELETE'});
  navigate('projects');
}

function openTaskModal(projectId, task) {
  document.getElementById('task-modal-title').textContent = task ? 'Edit Task' : 'New Task';
  document.getElementById('task-edit-id').value = task ? task.id : '';
  document.getElementById('task-project-id').value = projectId;
  document.getElementById('task-title').value = task ? task.title : '';
  document.getElementById('task-desc').value = task ? (task.description||'') : '';
  document.getElementById('task-priority').value = task ? task.priority : 'MEDIUM';
  document.getElementById('task-status').value = task ? task.status : 'TODO';
  document.getElementById('task-due').value = task && task.dueDate ? task.dueDate.slice(0,16) : '';
  document.getElementById('task-modal-alert').classList.remove('show');

  // Populate assignee dropdown
  const sel = document.getElementById('task-assignee');
  sel.innerHTML = '<option value="">— Unassigned —</option>';
  allUsers.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id;
    opt.textContent = `${u.fullName || u.username} (@${u.username})`;
    if (task && task.assignee && task.assignee.id == u.id) opt.selected = true;
    sel.appendChild(opt);
  });

  openModal('modal-task');
}

async function saveTask() {
  const id = document.getElementById('task-edit-id').value;
  const projectId = document.getElementById('task-project-id').value;
  const title = document.getElementById('task-title').value.trim();
  if (!title) { showModalAlert('task-modal-alert','Task title is required'); return; }
  const assigneeId = document.getElementById('task-assignee').value;
  const body = {
    title,
    description: document.getElementById('task-desc').value.trim(),
    priority: document.getElementById('task-priority').value,
    status: document.getElementById('task-status').value,
    assigneeId: assigneeId ? parseInt(assigneeId) : null,
    dueDate: document.getElementById('task-due').value || null
  };
  try {
    const res = id
      ? await apiFetch(`/tasks/${id}`, {method:'PUT', body:JSON.stringify(body)})
      : await apiFetch(`/projects/${projectId}/tasks`, {method:'POST', body:JSON.stringify(body)});
    if (!res.ok) { const e = await res.text(); showModalAlert('task-modal-alert', e); return; }
    closeModal('modal-task');
    renderProjectDetail();
  } catch(e) { showModalAlert('task-modal-alert','Server error'); }
}

async function quickUpdateStatus(taskId, status) {
  await apiFetch(`/tasks/${taskId}`, {method:'PUT', body:JSON.stringify({status})});
  renderMyTasks();
}

async function promoteUser(id) {
  if (!confirm('Promote this user to Admin?')) return;
  await apiFetch(`/admin/users/${id}/promote`, {method:'PUT'});
  renderUsers();
}

function showModalAlert(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

// ========== UTILS ==========
function formatDate(dt) {
  if (!dt) return '';
  return new Date(dt).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
}

// Click outside modal to close
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

// Enter key on login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const loginForm = document.getElementById('login-form');
    if (loginForm.style.display !== 'none') doLogin();
  }
});

// ========== BOOT ==========
if (token) initApp();
</script>
