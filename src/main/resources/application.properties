# ========================
# Team Task Manager Config
# ========================

# Server
server.port=${PORT:8080}

# ========================
# DATABASE CONFIG
# ========================

# Use Railway PostgreSQL in production, fallback to H2 locally
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# Driver (auto switch)
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA CONFIG
# ========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Auto switch dialect (Postgres in prod, H2 locally)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================
# H2 CONSOLE (DISABLE IN PROD)
# ========================

spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ========================
# JWT CONFIG
# ========================

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================
# CORS
# ========================

app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:8080,http://localhost:3000}

# ========================
# LOGGING
# ========================

logging.level.com.taskmanager=DEBUG
logging.level.org.springframework.security=WARN