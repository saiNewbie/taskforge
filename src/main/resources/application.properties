# ========================
# Team Task Manager Config
# ========================

# Server
server.port=${PORT:8080}

# Default: H2 in-memory (local dev)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:taskmanagerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Console (disable in prod)
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=${JWT_SECRET:MyVerySecureJWTSecretKeyForTaskManagerApp2024!}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:8080,http://localhost:3000}

# Logging
logging.level.com.taskmanager=DEBUG
logging.level.org.springframework.security=WARN
